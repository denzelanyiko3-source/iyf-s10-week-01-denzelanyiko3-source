<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <label for="menu-toggle" class="hamburger">&#9776;</label>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>

  <main>
    <section class="section">
      <div class="container">
        <h1>Contact Me</h1>
        <p>Have a question or want to connect? Send a message and I'll get back to you.</p>
<fieldset>
        <form class="contact-form">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>

          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">

          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="">Choose a subject</option>
            <option value="general">General Inquiry</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
          </select>
 </fieldset>
        <legend>
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Write your message..." minlength="50" required></textarea>
        </legend>
          <label class="checkbox">
            <input type="checkbox" name="newsletter">
            Subscribe to the newsletter
          </label>

          <button type="submit" class="btn">Submit</button>
        </form>
      </div>
      </section>

    <section class="section contact">
      <div class="contact-info">
        <h3>Get in touch</h3>
        <p>Feel free to reach out if you have any questions or would like to connect!</p>
        <p><strong>Email:</strong> denzelanyiko3@gmail.com</p>
        <p><strong>Phone:</strong> +254 705 370 271</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Denzel Portfolio</p>
  </footer>
</body>
</html>
